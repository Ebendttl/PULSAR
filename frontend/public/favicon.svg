<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0f2e"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <!-- Core glow — warm amber -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Ring gradient — indigo to cyan -->
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Outer ring — dimmer -->
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Jet beam gradient -->
    <linearGradient id="jet1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="jet2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <!-- Soft outer glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="core-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <!-- Clip circle -->
    <clipPath id="circle-clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g clip-path="url(#circle-clip)" opacity="0.12">
    <line x1="0" y1="16" x2="64" y2="16" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="48" x2="64" y2="48" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="16" y1="0" x2="16" y2="64" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="48" y1="0" x2="48" y2="64" stroke="#818cf8" stroke-width="0.5"/>
  </g>

  <!-- Outer magnetic ring 2 (faint) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#ring2)" stroke-width="0.75"/>

  <!-- Outer magnetic ring 1 -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#ring1)" stroke-width="1" opacity="0.6"/>

  <!-- Inner orbit ring -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#818cf8" stroke-width="0.75" opacity="0.4" stroke-dasharray="3 2"/>

  <!-- Relativistic jet — right (amber) -->
  <rect x="32" y="31" width="26" height="2" fill="url(#jet1)" rx="1"/>
  <!-- Jet tip dot -->
  <circle cx="58" cy="32" r="1.5" fill="#f59e0b" filter="url(#glow)"/>

  <!-- Relativistic jet — left (indigo) -->
  <rect x="6" y="31" width="26" height="2" fill="url(#jet2)" rx="1"/>
  <circle cx="6" cy="32" r="1.5" fill="#818cf8" filter="url(#glow)"/>

  <!-- Core glow halo -->
  <circle cx="32" cy="32" r="8" fill="#f59e0b" opacity="0.15" filter="url(#core-glow)"/>

  <!-- Core star -->
  <circle cx="32" cy="32" r="4" fill="url(#core)" filter="url(#glow)"/>

  <!-- Hard white center -->
  <circle cx="32" cy="32" r="1.5" fill="#ffffff"/>

  <!-- Border ring -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#1e293b" stroke-width="1"/>
</svg>
